<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Store API</title>
    <!-- Use a modern font -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap"
      rel="stylesheet"
    />
    <!-- Embedded CSS for a complete modern styling approach -->
    <style>
      /* Reset and base styling */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f4f4f9;
        color: #333;
        line-height: 1.6;
      }
      /* Header Section */
      header {
        background-color: #2c3e50;
        color: #fff;
        padding: 20px 0;
        text-align: center;
      }
      header h1 {
        font-size: 2.5rem;
        margin-bottom: 5px;
      }
      header p {
        font-size: 1rem;
      }
      /* Container */
      .container {
        width: 90%;
        max-width: 1200px;
        margin: 20px auto;
      }
      /* Grid layout for main content */
      .grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
      }
      /* Book List Styling */
      .book-list {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .book-list h2 {
        font-size: 1.75rem;
        margin-bottom: 15px;
        border-bottom: 2px solid #e0e0e0;
        padding-bottom: 10px;
      }
      .book-list p {
        margin-bottom: 15px;
      }
      .book-list ul {
        list-style: none;
      }
      .book-list li {
        padding: 10px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      .book-list li:last-child {
        border-bottom: none;
      }
      .book-list li:hover {
        background-color: #f0f0f0;
      }
      /* Book Details Section */
      .book-details {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .book-details img {
        max-width: 100%;
        border-radius: 5px;
        margin-bottom: 15px;
      }
      .book-details h3 {
        margin-bottom: 10px;
        font-size: 1.5rem;
      }
      .book-details p {
        margin-bottom: 8px;
      }
      .book-details p span.title {
        font-weight: 500;
      }
      /* Loader Styling */
      .loader {
        display: block;
        margin: 40px auto;
        width: 50px;
        height: 50px;
      }
      /* Simplified loader animation */
      @keyframes loaderAnim {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .loader circle {
        animation: loaderAnim 2s linear infinite;
      }
      /* Responsive design for smaller devices */
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <!-- Vue library and main script -->
    <script defer src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Book Store API</h1>
        <p>Explore a curated collection of outstanding reads</p>
      </div>
    </header>
    <div id="app" class="container">
      <div class="grid">
        <!-- Book List Column -->
        <div class="book-list">
          <h2>My Favorite Books</h2>
          <p>Click on a book for more details.</p>
          <div v-if="loadingBooks">
            <svg
              class="loader"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 50 50"
            >
              <circle
                cx="25"
                cy="25"
                r="20"
                stroke="#2c3e50"
                stroke-width="5"
                fill="none"
              ></circle>
            </svg>
          </div>
          <ul id="book-list">
            <li v-for="book in booksData" @click="getBook(book.id)">
              <strong>{{ book.title }}</strong>
            </li>
          </ul>
        </div>
        <!-- Book Details Column -->
        <div class="book-details">
          <div v-if="loading">
            <svg
              class="loader"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 50 50"
            >
              <circle
                cx="25"
                cy="25"
                r="20"
                stroke="#2c3e50"
                stroke-width="5"
                fill="none"
              ></circle>
            </svg>
          </div>
          <section v-if="error">
            <p style="color: red;">{{ error }}</p>
          </section>
          <section v-if="name">
            <img :src="`images/${image}`" alt="Book cover" />
            <h3>{{ name }}</h3>
            <p>
              <span class="title">First Published Year:</span>
              {{ published_date }}
            </p>
            <p>
              <span class="title">Bio:</span>
              {{ bio }}
            </p>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
